<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeverMiss — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
    --white: #ffffff;
    --error: #dc2626;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px;
  }
  .logo-text { font-size: 20px; font-weight: 500; color: var(--text); }
  .logo-text span { color: var(--green); }
  h1 { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  p.sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.75rem; }
  label { font-size: 13px; font-weight: 500; color: var(--text); display: block; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text);
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 1rem;
  }
  input:focus { border-color: var(--green); }
  .btn {
    width: 100%; padding: 11px;
    background: var(--green);
    color: white; border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--green-dark); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    font-size: 13px; color: var(--error);
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 8px; padding: 10px 12px;
    margin-bottom: 1rem; display: none;
  }
  .footer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Never<span>Miss</span></div>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your dashboard</p>
  <div class="error-msg" id="error-msg"></div>
  <label for="email">Email</label>
  <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  <button class="btn" id="login-btn" onclick="handleLogin()">Sign in</button>
  <div class="footer">Need access? Contact NeverMiss support.</div>
</div>

<script>
  // ⚠️ Replace these with your actual Supabase credentials
  const SUPABASE_URL = 'https://uwxthbxxiaujlgxosqjx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eHRoYnh4aWF1amxneG9zcWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTI5MDMsImV4cCI6MjA5MjcyODkwM30.gqqku9mD8r7hTJoGTc8KWcnVrFM39Go2zK-CiT61H7w';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');

    errEl.style.display = 'none';
    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }

    // Redirect to dashboard after login
    window.location.href = 'dashboard.html';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // Check if already logged in
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
