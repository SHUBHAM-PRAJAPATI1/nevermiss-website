<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>NeverMiss — Admin</title>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56;
    --text: #1a1a1a; --text-muted: #6b7280; --border: #e5e7eb;
    --bg: #f9fafb; --white: #ffffff; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
  .card h2 { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .field input, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; }
  .field input:focus, .field textarea:focus { border-color: var(--green); }
  .btn { background: var(--green); color: white; border: none; padding: 9px 18px; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn:hover { background: var(--green-dark); }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .pending-item { border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
  .pending-item .meta { font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.7; }
  .pending-item .meta strong { color: var(--text); }
  .pending-item .connect-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .pending-item .connect-form .full { grid-column: 1 / -1; }
  .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
  .status-msg { font-size: 13px; margin-top: 0.5rem; }
  .status-msg.success { color: var(--green-dark); }
  .status-msg.error { color: #C00; }
  #login-card { max-width: 360px; margin: 4rem auto; }
  #main-content { display: none; }

  /* NEW: tab navigation between admin pages */
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .admin-tab { padding: 8px 16px; border: 1px solid var(--border); background: var(--white); border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); }
  .admin-tab.active { background: var(--green); color: white; border-color: var(--green); }
  .admin-page { display: none; }
  .admin-page.active { display: block; }

  /* NEW: helpline conversation thread list */
  .search-input { width: 100%; max-width: 320px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; outline: none; margin-bottom: 1.25rem; }
  .search-input:focus { border-color: var(--green); }
  .thread { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
  .thread-head { padding: 12px 16px; background: var(--bg); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .thread-head:hover { background: var(--green-light); }
  .thread-phone { font-family: 'DM Mono', monospace; font-weight: 500; }
  .thread-preview { font-size: 12px; color: var(--text-muted); margin-top: 2px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thread-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .thread-body { display: none; padding: 1rem; max-height: 400px; overflow-y: auto; }
  .thread.expanded .thread-body { display: block; }
  .msg-row { margin-bottom: 10px; display: flex; }
  .msg-row.user { justify-content: flex-start; }
  .msg-row.assistant { justify-content: flex-end; }
  .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .msg-row.user .msg-bubble { background: var(--bg); color: var(--text); }
  .msg-row.assistant .msg-bubble { background: var(--green-light); color: var(--green-dark); }
  .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="card" id="login-card">
    <h2>Admin access</h2>
    <div class="field">
      <label for="admin-secret-input">Admin secret</label>
      <input type="password" id="admin-secret-input" placeholder="Enter admin secret" />
    </div>
    <button class="btn" onclick="unlock()">Unlock</button>
    <div class="status-msg error" id="login-error" style="display:none;">Incorrect secret or connection failed.</div>
  </div>

  <div id="main-content">
    <!-- NEW: tab bar switching between the two admin pages -->
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-pending" onclick="showAdminPage('pending')">Pending Connections</button>
      <button class="admin-tab" id="tab-conversations" onclick="showAdminPage('conversations')">Helpline Conversations</button>
    </div>

    <div class="admin-page active" id="page-pending">
      <h1>Pending WhatsApp Connections</h1>
      <div id="pending-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- NEW: helpline conversations page -->
    <div class="admin-page" id="page-conversations">
      <h1>Helpline Conversations</h1>
      <input type="text" class="search-input" id="conv-search" placeholder="Search by phone number..." oninput="renderConversations()" />
      <div id="conversations-list"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = 'https://my-saas-bot.onrender.com';
let adminSecret = '';
let allSupportConversations = []; // flat list from the API, grouped client-side

function unlock() {
  adminSecret = document.getElementById('admin-secret-input').value.trim();
  if (!adminSecret) return;
  loadPending();
}

// NEW: switches between the Pending Connections and Helpline
// Conversations pages. Loads conversation data lazily on first visit
// to that tab, not on initial unlock, so unlocking stays fast.
function showAdminPage(page) {
  document.querySelectorAll('.admin-page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('tab-' + page).classList.add('active');
  if (page === 'conversations' && allSupportConversations.length === 0) {
    loadSupportConversations();
  }
}

async function loadPending() {
  var listEl = document.getElementById('pending-list');
  try {
    var res = await fetch(BACKEND_URL + '/admin/pending-connections?admin_secret=' + encodeURIComponent(adminSecret));
    var data = await res.json();
    if (!data.success) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    sessionStorage.setItem('nm_admin_secret', adminSecret);
    renderPending(data.pending);
  } catch (e) {
    document.getElementById('login-error').textContent = 'Network error. Please try again.';
    document.getElementById('login-error').style.display = 'block';
  }
}

function renderPending(pending) {
  var listEl = document.getElementById('pending-list');
  if (!pending || !pending.length) {
    listEl.innerHTML = '<div class="empty">No pending connections right now.</div>';
    return;
  }
  listEl.innerHTML = pending.map(function(p, i) {
    var created = p.created_at ? new Date(p.created_at).toLocaleString('en-IN') : '—';
    return (
      '<div class="pending-item" id="pending-' + i + '">' +
        '<div class="meta">' +
          '<div><strong>Business:</strong> ' + (p.business_name || '—') + '</div>' +
          '<div><strong>Email:</strong> ' + (p.user_email || '—') + '</div>' +
          '<div><strong>Number to connect:</strong> ' + (p.requested_business_number || '—') + '</div>' +
          '<div><strong>Notification number:</strong> ' + (p.owner_whatsapp || '—') + '</div>' +
          '<div><strong>Requested:</strong> ' + created + '</div>' +
        '</div>' +
        '<div class="connect-form">' +
          '<div class="field full"><label>Access Token (System User)</label><textarea rows="2" id="token-' + i + '" placeholder="Paste access token"></textarea></div>' +
          '<div class="field"><label>WABA ID</label><input type="text" id="waba-' + i + '" placeholder="e.g. 1015988340769375" /></div>' +
          '<div class="field"><label>Phone Number ID</label><input type="text" id="phoneid-' + i + '" placeholder="e.g. 1166327266571546" /></div>' +
        '</div>' +
        '<button class="btn" onclick="activate(' + i + ', \'' + (p.user_email || '').replace(/'/g, "\\'") + '\', \'' + (p.business_name || '').replace(/'/g, "\\'") + '\')">Activate</button>' +
        '<div class="status-msg" id="status-' + i + '"></div>' +
      '</div>'
    );
  }).join('');
}

async function activate(i, userEmail, businessName) {
  var token = document.getElementById('token-' + i).value.trim();
  var wabaId = document.getElementById('waba-' + i).value.trim();
  var phoneId = document.getElementById('phoneid-' + i).value.trim();
  var statusEl = document.getElementById('status-' + i);

  if (!token || !wabaId || !phoneId) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Please fill in all three fields.';
    return;
  }

  statusEl.className = 'status-msg';
  statusEl.textContent = 'Activating...';

  try {
    var res = await fetch(BACKEND_URL + '/admin/manual-connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        admin_secret: adminSecret,
        user_email: userEmail,
        access_token: token,
        waba_id: wabaId,
        phone_number_id: phoneId,
        business_name: businessName
      })
    });
    var data = await res.json();
    if (data.success) {
      statusEl.className = 'status-msg success';
      statusEl.textContent = '✅ Connected! This client is now active.';
      setTimeout(function() { loadPending(); }, 1500);
    } else {
      statusEl.className = 'status-msg error';
      statusEl.textContent = 'Failed: ' + (data.error || 'Unknown error');
    }
  } catch (e) {
    statusEl.className = 'status-msg error';
    statusEl.textContent = 'Network error. Please try again.';
  }
}

// NEW: fetches all helpline conversation history (flat list, most
// recent first) and stores it for client-side grouping/rendering.
async function loadSupportConversations() {
  var listEl = document.getElementById('conversations-list');
  listEl.innerHTML = '<div class="empty">Loading...</div>';
  try {
    var res = await fetch(BACKEND_URL + '/admin/support-conversations?admin_secret=' + encodeURIComponent(adminSecret));
    var data = await res.json();
    if (!data.success) {
      listEl.innerHTML = '<div class="empty">Failed to load conversations.</div>';
      return;
    }
    allSupportConversations = data.conversations || [];
    renderConversations();
  } catch (e) {
    listEl.innerHTML = '<div class="empty">Network error loading conversations.</div>';
  }
}

// NEW: groups the flat message list into per-phone-number threads,
// sorted by most recent activity, filtered by the search box if a
// phone number substring is typed in. Each thread starts collapsed,
// showing just the phone number and a preview of the latest message --
// clicking expands the full back-and-forth.
function renderConversations() {
  var listEl = document.getElementById('conversations-list');
  var query = (document.getElementById('conv-search').value || '').trim();

  var grouped = {};
  allSupportConversations.forEach(function(m) {
    if (!grouped[m.phone_number]) grouped[m.phone_number] = [];
    grouped[m.phone_number].push(m);
  });

  var phones = Object.keys(grouped);
  if (query) {
    phones = phones.filter(function(p) { return p.includes(query); });
  }

  if (!phones.length) {
    listEl.innerHTML = '<div class="empty">No conversations found.</div>';
    return;
  }

  // Sort threads by their most recent message, newest first. Messages
  // within each thread come back created_at DESC from the API, so
  // index 0 is already the latest for that phone number.
  phones.sort(function(a, b) {
    return new Date(grouped[b][0].created_at) - new Date(grouped[a][0].created_at);
  });

  listEl.innerHTML = phones.map(function(phone, idx) {
    var messages = grouped[phone].slice().reverse(); // oldest first for display
    var latest = grouped[phone][0];
    var latestTime = latest.created_at ? new Date(latest.created_at).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';
    var preview = (latest.content || '').slice(0, 60);

    var bubbles = messages.map(function(m) {
      var t = m.created_at ? new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '';
      return (
        '<div class="msg-row ' + m.role + '">' +
          '<div><div class="msg-bubble">' + escapeHtml(m.content) + '</div>' +
          '<div class="msg-time">' + t + '</div></div>' +
        '</div>'
      );
    }).join('');

    return (
      '<div class="thread" id="thread-' + idx + '">' +
        '<div class="thread-head" onclick="toggleThread(' + idx + ')">' +
          '<div><div class="thread-phone">' + phone + '</div><div class="thread-preview">' + escapeHtml(preview) + '</div></div>' +
          '<div class="thread-time">' + latestTime + '</div>' +
        '</div>' +
        '<div class="thread-body">' + bubbles + '</div>' +
      '</div>'
    );
  }).join('');
}

function toggleThread(idx) {
  document.getElementById('thread-' + idx).classList.toggle('expanded');
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Auto-unlock if secret was already entered this session
window.addEventListener('load', function() {
  var saved = sessionStorage.getItem('nm_admin_secret');
  if (saved) {
    document.getElementById('admin-secret-input').value = saved;
    adminSecret = saved;
    loadPending();
  }
});
</script>
</body>
</html>
