<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Set your password — NeverMiss</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --green:#1D9E75; --green-dark:#0F6E56; --text:#1a1a1a; --muted:#6b7280; --border:#e5e7eb; --bg:#f9fafb; --white:#fff; --error:#dc2626; --r:12px; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
  .logo-icon{width:40px;height:40px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
  .logo-text{font-size:20px;font-weight:500;}
  .logo-text span{color:var(--green);}
  h1{font-size:22px;font-weight:500;margin-bottom:6px;}
  p.sub{font-size:14px;color:var(--muted);margin-bottom:1.75rem;}
  label{font-size:13px;font-weight:500;display:block;margin-bottom:6px;}
  input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:1rem;}
  input:focus{border-color:var(--green);}
  .btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;}
  .btn:hover{background:var(--green-dark);}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .err{font-size:13px;color:var(--error);background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;margin-bottom:1rem;display:none;}
  #loading{text-align:center;color:var(--muted);font-size:14px;padding:1rem 0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Never<span>Miss</span></div>
  </div>
  <p id="loading">Verifying your invite link...</p>
  <div id="form-section" style="display:none;">
    <h1>Set your password</h1>
    <p class="sub">Choose a password to access your dashboard</p>
    <div class="err" id="err"></div>
    <label>New password</label>
    <input type="password" id="fpass" placeholder="Min 8 characters" minlength="8"/>
    <label>Confirm password</label>
    <input type="password" id="fconfirm" placeholder="Repeat password"/>
    <button class="btn" id="fbtn" onclick="setPassword()">Set password & go to dashboard</button>
  </div>
  <div id="error-section" style="display:none;text-align:center;color:var(--error);font-size:14px;padding:1rem 0;">
    This invite link is invalid or has expired.<br>
    <a href="mailto:shubhamprajapati120821@gmail.com" style="color:var(--green);">Contact NeverMiss support</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var _db = supabase.createClient(
  'https://uwxthbxxiaujlgxosqjx.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eHRoYnh4aWF1amxneG9zcWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTI5MDMsImV4cCI6MjA5MjcyODkwM30.gqqku9mD8r7hTJoGTc8KWcnVrFM39Go2zK-CiT61H7w'
);

// Supabase JS picks up the session from the URL hash automatically
// when the user clicks the invite link. We just wait for it.
_db.auth.onAuthStateChange(function(event, session) {
  if (session) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
  } else if (event === 'SIGNED_OUT' || !session) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-section').style.display = 'block';
  }
});

async function setPassword() {
  var pass    = document.getElementById('fpass').value;
  var confirm = document.getElementById('fconfirm').value;
  var btn     = document.getElementById('fbtn');
  var err     = document.getElementById('err');
  err.style.display = 'none';

  if (pass.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block';
    return;
  }
  if (pass !== confirm) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  var r = await _db.auth.updateUser({ password: pass });
  if (r.error) {
    err.textContent = r.error.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Set password & go to dashboard';
    return;
  }

  // Password set, session is active -- send to dashboard
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
